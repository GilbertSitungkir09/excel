<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Excel Portal - Shortcut</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --excel-green: #217346; --excel-dark: #103822; --bg: #f3f4f6; --white: #ffffff; --text: #1f2937; --sidebar-width: 280px; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); padding-top: 60px; }
        header { background: var(--excel-green); color: white; padding: 15px 20px; display: flex; align-items: center; position: fixed; width: 100%; top: 0; }
        .menu-btn { font-size: 24px; background: none; border: none; color: white; cursor: pointer; margin-right: 15px; }
        .sidebar { position: fixed; left: -280px; top: 0; height: 100%; width: var(--sidebar-width); background: var(--excel-dark); color: white; transition: 0.3s; z-index: 1100; padding-top: 60px; }
        .sidebar.active { left: 0; }
        .sidebar a { display: block; padding: 15px 25px; color: #cbd5e1; text-decoration: none; font-weight: 600; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .main-content { max-width: 1000px; margin: 0 auto; padding: 20px; }
        .card { background: var(--white); padding: 25px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .video-box.shorts { padding-bottom: 177.77%; position: relative; height: 0; overflow: hidden; border-radius: 10px; max-width: 350px; margin: 15px auto; background: #000; }
        .video-box iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .shortcut-item { background: #f8fafc; padding: 15px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #e2e8f0; }
        .key { background: #ecfdf5; color: var(--excel-green); font-weight: 800; padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <header>
        <button class="menu-btn" onclick="toggleMenu()">☰</button>
        <h1>Shortcut Keyboard</h1>
    </header>
    <nav class="sidebar" id="sidebar">
        <a href="index.html">🏠 Halaman Utama</a>
        <a href="rumus.html">🧮 Kamus Rumus & Fungsi</a>
        <a href="shortcut.html">⌨️ Shortcut Keyboard</a>
    </nav>
    <div class="main-content">
        <div class="card">
            <h2>🔥 Shortcut Terpopuler</h2>
            <div class="shortcut-item">
                <p><span class="key">ALT + =</span> : Auto Sum (Penjumlahan Kilat)</p>
                <div class="video-box shorts">
                    <iframe src="https://www.youtube.com/embed/m67OXXvoB7s" frameborder="0" allowfullscreen></iframe>
                </div>
            </div>
            <div class="shortcut-item"><p><span class="key">CTRL + SHIFT + L</span> : Pasang Filter Otomatis</p></div>
            <div class="shortcut-item"><p><span class="key">F4</span> : Mengunci Sel (Absolute Reference $)</p></div>
        </div>
        <footer>© 2026 Master Excel Portal</footer>
    </div>
    <script>function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }</script>
</body>
</html>
